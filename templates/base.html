<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WalkingDad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?display=swap&family=Noto+Sans:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700">

    {% if connecting %}
    <meta http-equiv="refresh" content="3">
    {% endif %}

    <style>
        /* Custom properties from the design file */
        :root {
            --background-color: #f8fafc; /* bg-slate-50 */
            --card-color: #e7edf4;
            --text-color: #0d141c;
            --primary-blue: #0c7ff2;
            --border-color: #e7edf4;
            --header-bg: white;
            --button-hover-bg: #d8e0ea;
            --primary-hover: #0a6bcf;
            --muted-color: #6c757d;
        }

        /* Dark mode overrides */
        [data-theme="dark"] {
            --background-color: #0f172a; /* slate-900 */
            --card-color: #1e293b; /* slate-800 */
            --text-color: #f1f5f9; /* slate-100 */
            --primary-blue: #0c7ff2;
            --border-color: #334155; /* slate-700 */
            --header-bg: #1e293b; /* slate-800 */
            --button-hover-bg: #334155; /* slate-700 */
            --primary-hover: #3a94ff;
            --muted-color: #94a3b8; /* slate-400 */
        }

        body {
            font-family: "Space Grotesk", "Noto Sans", sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        /* Header styles */
        .app-header {
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .app-header .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text-color);
        }

        /* Header buttons and indicator */
        .btn-header-close {
            background-color: var(--card-color);
            color: var(--text-color);
            font-weight: 500;
            font-size: 0.9rem;
            border: none;
            padding: 0.3rem 0.8rem;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .btn-header-close:hover {
            background-color: var(--button-hover-bg);
            color: var(--text-color);
        }

        /* Theme toggle button */
        .btn-theme-toggle {
            background-color: var(--card-color);
            color: var(--text-color);
            font-weight: 500;
            font-size: 1rem;
            border: none;
            padding: 0.3rem 0.6rem;
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .btn-theme-toggle:hover {
            background-color: var(--button-hover-bg);
            color: var(--text-color);
        }

        /* Comma separator between header controls */
        .header-separator {
            color: var(--border-color);
            user-select: none;
        }

        .connection-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .connection-indicator .bi {
            font-size: 1.2rem;
        }

        /* Main content styles */
        .content-title {
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-card {
            background-color: var(--card-color);
            padding: 1.5rem;
            border-radius: 0.5rem;
            transition: background-color 0.2s ease;
        }

        .stat-card .stat-label {
            font-size: 1rem;
            font-weight: 500;
        }

        .stat-card .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
        }

        /* Custom button styles */
        .btn-custom-primary {
            background-color: var(--primary-blue);
            color: white;
            font-weight: 700;
            padding: 0.75rem 2rem;
        }
        .btn-custom-primary:hover {
            background-color: var(--primary-hover);
            color: white;
        }

        /* Override Bootstrap's .text-muted for dark mode readability */
        .text-muted {
            color: var(--muted-color) !important;
        }
    </style>
</head>
<body>
    <header class="app-header sticky-top">
        <nav class="container-xl d-flex align-items-center justify-content-between py-3 px-4">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('root') }}">
                <i class="bi bi-caret-down-fill"></i>
                <span>WalkingPad</span>
            </a>

            <div class="d-flex align-items-center gap-1">
                <button id="theme-toggle" class="btn btn-theme-toggle" title="Toggle theme (Light / Dark / System)">
                    <i class="bi bi-moon-fill" id="theme-icon"></i>
                </button>
                <span class="header-separator px-2">|</span>
                
                <button id="shutdown-button" class="btn btn-header-close">Close</button>
                
                <div class="connection-indicator">
                    {% if connected %}
                        <i class="bi bi-wifi text-success"></i>
                        <span class="text-success d-none d-md-inline">Connected</span>
                    {% elif connecting %}
                        <i class="bi bi-arrow-repeat text-warning"></i>
                        <span class="text-warning d-none d-md-inline">Connecting</span>
                    {% else %}
                        <i class="bi bi-wifi-off text-danger"></i>
                        <span class="text-danger d-none d-md-inline">Disconnected</span>
                    {% endif %}
                </div>
            </div>
        </nav>
    </header>

    <main class="container-xl py-5">
        <div class="mx-auto" style="max-width: 960px;">
            {% block content %}{% endblock %}
        </div>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Dark Mode logic — three states: light, dark, system
    (function() {
        const root = document.documentElement;
        const toggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const STORAGE_KEY = 'walkingpad-theme';

        // Track the explicit mode separately from the applied visual theme
        var currentMode = 'system'; // default

        function getSystemPreference() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            root.setAttribute('data-theme', theme);
            // Only set icon if we are NOT in system mode (applyMode handles that)
            if (currentMode !== 'system') {
                if (theme === 'dark') {
                    themeIcon.className = 'bi bi-moon-fill';
                } else {
                    themeIcon.className = 'bi bi-sun-fill';
                }
            }
        }

        function applyMode(mode) {
            // mode: 'light' | 'dark' | 'system'
            currentMode = mode;
            if (mode === 'system') {
                localStorage.removeItem(STORAGE_KEY);
                themeIcon.className = 'bi bi-display-fill';
                applyTheme(getSystemPreference());
            } else {
                localStorage.setItem(STORAGE_KEY, mode);
                applyTheme(mode);
            }
        }

        // Initialize
        var savedMode = localStorage.getItem(STORAGE_KEY);
        applyMode(savedMode || 'system');

        // Cycle: light → dark → system → light ...
        toggleBtn.addEventListener('click', function() {
            if (currentMode === 'light') {
                applyMode('dark');
            } else if (currentMode === 'dark') {
                applyMode('system');
            } else {
                // system → light
                applyMode('light');
            }
        });

        // Listen for OS-level theme changes — only auto-follow in system mode
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (currentMode === 'system') {
                applyTheme(e.matches ? 'dark' : 'light');
            }
        });
    })();

    document.getElementById('shutdown-button').addEventListener('click', function(e) {
      e.preventDefault();
      if (confirm('Are you sure you want to shut down the server?')) {
        // "Fire-and-forget" the shutdown request. We do not wait for a response
        // because the server will be terminated before it can send one.
        fetch("{{ url_for('shutdown') }}", { method: 'POST' });

        // Immediately update the page and prepare to close the window.
        document.body.innerHTML = '<div class="container text-center flex-fill d-flex flex-column justify-content-center"><h2>Server is shutting down. You may now close this window.</h2></div>';
        
        // Give the fetch request a moment to be sent before closing.
        setTimeout(function() {
          window.close();
        }, 750); // Increased delay slightly
      }
    });
    </script>
</body>
</html>
